name: Daily DB Paper Digest

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily — adjust if you want a different timezone
  workflow_dispatch:        # lets you trigger a run manually from the GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config from secret
        run: printf '%s' "$CONFIG_YAML" > /tmp/config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run digest
        run: python main.py
        env:
          DIGEST_CONFIG: /tmp/config.yaml
          CSCS_SERVING_API: ${{ secrets.CSCS_SERVING_API }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
