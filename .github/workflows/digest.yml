name: Daily DB Paper Digest

on:
  schedule:
    - cron: '0 2 * * *'   # buffer: 04:00 CEST target, up to ~2h GitHub lag → ready by 06:00 CEST
  workflow_dispatch:
    inputs:
      since:
        description: 'Fetch papers since this date (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
      date:
        description: 'Fetch papers for a single specific date (YYYY-MM-DD). Leave empty for yesterday.'
        required: false

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config from secret
        run: printf '%s' "$CONFIG_YAML" > /tmp/config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run digest
        run: |
          ARGS=""
          [ -n "$SINCE" ] && ARGS="--since $SINCE"
          [ -n "$DATE" ]  && ARGS="--date $DATE"
          python main.py $ARGS
        env:
          SINCE: ${{ github.event.inputs.since }}
          DATE: ${{ github.event.inputs.date }}
          DIGEST_CONFIG: /tmp/config.yaml
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
